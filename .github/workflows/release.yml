name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build release binary
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Init manifest
        run: .build/release/latchkeyd manifest init --force

      - name: Refresh manifest
        run: .build/release/latchkeyd manifest refresh

      - name: Verify manifest
        run: .build/release/latchkeyd manifest verify

      - name: Validate setup
        env:
          LATCHKEYD_BIN: ${{ github.workspace }}/.build/release/latchkeyd
        run: .build/release/latchkeyd validate

      - name: Package artifact
        run: |
          mkdir -p dist
          cp .build/release/latchkeyd dist/latchkeyd
          chmod +x dist/latchkeyd
          shasum -a 256 dist/latchkeyd > dist/latchkeyd.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/latchkeyd
            dist/latchkeyd.sha256
