<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="32" fill="#F4F0E7"/>
  <rect x="44" y="44" width="1112" height="542" rx="28" fill="#132333"/>
  <text x="88" y="88" fill="#9BB0C2" font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="2">LOCAL TRUST GATE FOR AGENT WORKFLOWS</text>
  <text x="88" y="192" fill="#F4F0E7" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700">Keep secrets local.</text>
  <text x="88" y="252" fill="#87A9C3" font-family="Inter, Arial, sans-serif" font-size="38">Approve the handoff. Fail closed on drift.</text>
  <text x="88" y="326" fill="#C9D5DE" font-family="Inter, Arial, sans-serif" font-size="26">`latchkeyd` verifies the wrapper, verifies the tool,</text>
  <text x="88" y="364" fill="#C9D5DE" font-family="Inter, Arial, sans-serif" font-size="26">and injects only the secret needed for that run.</text>

  <rect x="88" y="430" width="220" height="96" rx="22" fill="#ECF1F5"/>
  <rect x="364" y="430" width="220" height="96" rx="22" fill="#335171"/>
  <rect x="640" y="430" width="220" height="96" rx="22" fill="#ECF1F5"/>
  <rect x="916" y="430" width="170" height="96" rx="22" fill="#3C2B31" stroke="#D98484" stroke-width="4"/>
  <path d="M308 478H364" stroke="#79C1A7" stroke-width="8" stroke-linecap="round"/>
  <path d="M584 478H640" stroke="#79C1A7" stroke-width="8" stroke-linecap="round"/>
  <path d="M860 478H916" stroke="#D98484" stroke-width="8" stroke-dasharray="12 12" stroke-linecap="round"/>

  <text x="116" y="470" fill="#132333" font-family="Menlo, Monaco, monospace" font-size="22" font-weight="700">Wrapper</text>
  <text x="116" y="500" fill="#557089" font-family="Menlo, Monaco, monospace" font-size="16">small action surface</text>

  <text x="394" y="470" fill="#F4F0E7" font-family="Menlo, Monaco, monospace" font-size="22" font-weight="700">latchkeyd</text>
  <text x="394" y="500" fill="#C8D6E1" font-family="Menlo, Monaco, monospace" font-size="16">verify + inject</text>

  <text x="668" y="470" fill="#132333" font-family="Menlo, Monaco, monospace" font-size="22" font-weight="700">Trusted tool</text>
  <text x="668" y="500" fill="#557089" font-family="Menlo, Monaco, monospace" font-size="16">scoped env only</text>

  <text x="942" y="470" fill="#F2D7D7" font-family="Menlo, Monaco, monospace" font-size="22" font-weight="700">Denied</text>
  <text x="942" y="500" fill="#F2D7D7" font-family="Menlo, Monaco, monospace" font-size="16">drift / hijack</text>
</svg>
